services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision_db}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vision_user} -d ${POSTGRES_DB:-vision_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
      - ./backend/models:/app/models
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env

  celery_worker:
    build: ./backend
    command: celery -A config worker -l info
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
      - ./backend/models:/app/models
    env_file:
      - ./backend/.env

  celery_beat:
    build: ./backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
      - ./backend/models:/app/models
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001

volumes:
  postgres_data:

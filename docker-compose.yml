x-backend-env: &backend-env
  SECRET_KEY: ${SECRET_KEY:-insecure-dev-key-change-me}
  DEBUG: ${DJANGO_DEBUG:-False}
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
  ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  DB_NAME: ${DB_NAME:-vision_db}
  DB_USER: ${DB_USER:-vision_user}
  DB_PASSWORD: ${DB_PASSWORD:-vision_password}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
  CELERY_BROKER_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
  CELERY_RESULT_BACKEND: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
  MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
  MODELS_PATH: ${MODELS_PATH:-/app/models}
  DEMO_USER: ${DEMO_USER:-admin}
  DEMO_PASSWORD: ${DEMO_PASSWORD:-admin12345}
  DEMO_EMAIL: ${DEMO_EMAIL:-admin@example.com}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-vision_db}
      POSTGRES_USER: ${DB_USER:-vision_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vision_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vision_user} -d ${DB_NAME:-vision_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    pull_policy: build
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - models_data:/app/models
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      <<: *backend-env

  celery_worker:
    build: ./backend
    pull_policy: build
    command: celery -A config worker -l info
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - models_data:/app/models
    environment:
      <<: *backend-env

  celery_worker_training:
    build: ./backend
    pull_policy: build
    # Cola dedicada "training", concurrencia 1: el entrenamiento YOLOv8
    # satura CPU/RAM y no debe competir con la inferencia de vuelos.
    command: celery -A config worker -l info -Q training --concurrency=1
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - models_data:/app/models
    environment:
      <<: *backend-env

  celery_worker_converter:
    build: ./backend
    pull_policy: build
    # Cola dedicada "conversion", concurrencia 2: la conversión de GeoTIFF
    # a tiles es I/O intensiva y puede paralelizarse más que el entrenamiento.
    command: celery -A config worker -l info -Q conversion --concurrency=2
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - models_data:/app/models
    environment:
      <<: *backend-env

  celery_beat:
    build: ./backend
    pull_policy: build
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - models_data:/app/models
    environment:
      <<: *backend-env

  frontend:
    build: ./frontend
    pull_policy: build
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}

volumes:
  postgres_data:
  media_data:
  models_data:

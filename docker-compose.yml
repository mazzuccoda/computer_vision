services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision_db}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
      - ./backend/models:/app/models
    ports:
      - "8001:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision_db}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
      DB_NAME: ${POSTGRES_DB:-vision_db}
      DB_USER: ${POSTGRES_USER:-vision_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_DEBUG: "False"
      DEBUG: "False"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

  celery_worker:
    build: ./backend
    command: celery -A config worker -l info
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
      - ./backend/models:/app/models
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision_db}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
      DB_NAME: ${POSTGRES_DB:-vision_db}
      DB_USER: ${POSTGRES_USER:-vision_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_DEBUG: "False"
      DEBUG: "False"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

  celery_beat:
    build: ./backend
    command: >
      sh -c "python manage.py migrate django_celery_beat --noinput &&
             celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
      - ./backend/models:/app/models
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision_db}
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
      DB_NAME: ${POSTGRES_DB:-vision_db}
      DB_USER: ${POSTGRES_USER:-vision_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_DEBUG: "False"
      DEBUG: "False"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

 frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001

volumes:
  postgres_data:
